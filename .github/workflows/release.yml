name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: ssh-menu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: ssh-menu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: ssh-menu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: ssh-menu.exe
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ssh-menu-${{ matrix.target }}.tar.gz ${{ matrix.bin }}
      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target\${{ matrix.target }}\release\${{ matrix.bin }} -DestinationPath ssh-menu-${{ matrix.target }}.zip
      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          generate_release_notes: false
          files: |
            ssh-menu-${{ matrix.target }}.tar.gz
            ssh-menu-${{ matrix.target }}.zip
