<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0F111A"/>
      <stop offset="100%" stop-color="#1A1F35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#7FDBFF"/>
      <stop offset="100%" stop-color="#AA82FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded dark background -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Outer neon frame -->
  <rect x="10" y="10" width="236" height="236" rx="40" ry="40"
        fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.35"/>

  <!-- Terminal prompt chevron >_ -->
  <g filter="url(#glow)">
    <polyline points="66,92 110,128 66,164"
              fill="none" stroke="url(#accent)"
              stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="124" y="158" width="72" height="10" rx="5" ry="5"
          fill="url(#accent)"/>
  </g>

  <!-- Three stacked "menu" dots on the right, indicating list -->
  <g fill="#7FDBFF">
    <circle cx="206" cy="80"  r="6"/>
    <circle cx="206" cy="104" r="6" opacity="0.75"/>
    <circle cx="206" cy="128" r="6" opacity="0.5"/>
  </g>

  <!-- Tiny status dot (green) lower-left accent -->
  <circle cx="50" cy="206" r="7" fill="#6EE7B7"/>
</svg>
